name: Deploy to Windows VPS via PM2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Tarik Kode Terbaru (Git Pull)
        shell: powershell
        run: |
          cd C:\Sentimen-ai
          git fetch origin
          git reset --hard origin/main

      - name: Pasang Dependensi Python
        shell: powershell
        run: |
          cd C:\Sentimen-ai
          pip install -r requirements.txt

      - name: Restart Layanan menggunakan PM2
        shell: powershell
        run: |
          pm2 restart SentimenWeb
          pm2 restart SentimenEngine
